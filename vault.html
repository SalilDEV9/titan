<!DOCTYPE html>
<html>
<head>
    <title>Titan Vault | Admin</title>
    <style>
        body { background: #0d0d0d; color: #00ff88; font-family: monospace; padding: 20px; }
        .log-entry { border: 1px solid #333; margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #1a1a1a; }
        img { max-width: 100%; border: 1px solid #00ff88; margin-top: 10px; border-radius: 4px; }
        .meta { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>TITAN CLOUD VAULT</h1>
    <div id="data-container">Loading secure logs...</div>

    <script>
        // Use your worker URL but add a custom 'GET' handler
        const API = "https://titan-logger.saliljha523.workers.dev";

        async function loadLogs() {
            const res = await fetch(API);
            const logs = await res.json();
            const container = document.getElementById('data-container');
            container.innerHTML = logs.map(log => `
                <div class="log-entry">
                    <div class="meta">ID: ${log.id} | ${log.timestamp}</div>
                    <div class="meta">LOC: ${log.location}</div>
                    <img src="${log.image}">
                </div>
            `).join('');
        }
        loadLogs();
    </script>
</body>
</html>
